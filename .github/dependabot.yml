version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      tonic:
        patterns:
          - "tonic"       # matches the main entry
          - "tonic-*"     # matches tonic-0XY (and any future aliases)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
